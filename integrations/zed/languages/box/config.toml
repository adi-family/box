name           = "Box"
grammar        = "box"
path_suffixes  = ["box"]
line_comments  = ["// "]
block_comment  = ["/* ", " */"]
autoclose_before = ";:.,=}])>"

[[brackets]]
start   = "{"
end     = "}"
close   = true
newline = true

[[brackets]]
start   = "["
end     = "]"
close   = true
newline = true

[[brackets]]
start   = "("
end     = ")"
close   = true
newline = true

[[brackets]]
start   = "\""
end     = "\""
close   = true
newline = false
